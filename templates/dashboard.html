<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FF Bot - Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
        }
        
        /* Navbar */
        .navbar {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .logo {
            font-size: 20px;
            font-weight: 700;
            background: linear-gradient(135deg, #ff6b6b, #4ecdc4);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .logout-btn {
            color: rgba(255, 255, 255, 0.8);
            text-decoration: none;
            padding: 8px 16px;
            border-radius: 8px;
            transition: all 0.3s ease;
        }
        
        .logout-btn:hover {
            background: rgba(255, 255, 255, 0.1);
        }
        
        /* Container */
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 30px;
        }
        
        /* Stats Cards */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .stat-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            padding: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: transform 0.3s ease;
        }
        
        .stat-card:hover {
            transform: translateY(-5px);
        }
        
        .stat-title {
            color: rgba(255, 255, 255, 0.6);
            font-size: 14px;
            margin-bottom: 10px;
        }
        
        .stat-value {
            font-size: 32px;
            font-weight: 700;
            color: white;
        }
        
        .stat-unit {
            font-size: 14px;
            color: rgba(255, 255, 255, 0.5);
            margin-left: 5px;
        }
        
        /* Main Content */
        .main-content {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
        }
        
        .card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            overflow: hidden;
        }
        
        .card-header {
            padding: 20px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            font-weight: 600;
            color: white;
            font-size: 18px;
        }
        
        .card-body {
            padding: 20px;
        }
        
        /* Form */
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-group label {
            display: block;
            color: rgba(255, 255, 255, 0.8);
            margin-bottom: 8px;
            font-size: 14px;
            font-weight: 500;
        }
        
        .form-group input, .form-group textarea {
            width: 100%;
            padding: 12px 16px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 10px;
            color: white;
            font-size: 14px;
            transition: all 0.3s ease;
        }
        
        .form-group input:focus, .form-group textarea:focus {
            outline: none;
            border-color: #4ecdc4;
            background: rgba(255, 255, 255, 0.15);
        }
        
        .form-group input::placeholder, .form-group textarea::placeholder {
            color: rgba(255, 255, 255, 0.4);
        }
        
        .form-row {
            display: grid;
            grid-template-columns: 1fr auto;
            gap: 15px;
            align-items: end;
        }
        
        button {
            padding: 12px 24px;
            background: linear-gradient(135deg, #ff6b6b, #4ecdc4);
            border: none;
            border-radius: 10px;
            color: white;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        button:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(78, 205, 196, 0.3);
        }
        
        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        .btn-secondary {
            background: rgba(255, 255, 255, 0.1);
        }
        
        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.2);
        }
        
        /* Squad Info */
        .squad-info {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 10px;
            padding: 15px;
            margin-top: 20px;
        }
        
        .squad-info h4 {
            color: #4ecdc4;
            margin-bottom: 10px;
            font-size: 14px;
        }
        
        .squad-info p {
            color: rgba(255, 255, 255, 0.8);
            font-size: 13px;
            margin: 5px 0;
            word-break: break-all;
        }
        
        .squad-info code {
            background: rgba(0, 0, 0, 0.5);
            padding: 2px 6px;
            border-radius: 5px;
            font-size: 12px;
        }
        
        /* Progress Bar */
        .progress-section {
            margin-top: 20px;
        }
        
        .progress-bar {
            width: 100%;
            height: 8px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            overflow: hidden;
            margin: 10px 0;
        }
        
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #ff6b6b, #4ecdc4);
            border-radius: 10px;
            transition: width 0.3s ease;
            width: 0%;
        }
        
        .progress-text {
            color: rgba(255, 255, 255, 0.6);
            font-size: 12px;
            text-align: center;
        }
        
        /* Clients List */
        .client-list {
            max-height: 300px;
            overflow-y: auto;
        }
        
        .client-item {
            padding: 12px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .client-item:last-child {
            border-bottom: none;
        }
        
        .client-id {
            color: white;
            font-weight: 500;
            font-size: 14px;
        }
        
        .client-status {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .status-badge {
            padding: 4px 8px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 600;
        }
        
        .status-connected {
            background: rgba(78, 205, 196, 0.2);
            color: #4ecdc4;
        }
        
        .status-error {
            background: rgba(255, 107, 107, 0.2);
            color: #ff6b6b;
        }
        
        .status-logging {
            background: rgba(255, 193, 7, 0.2);
            color: #ffc107;
        }
        
        .status-initializing {
            background: rgba(108, 117, 125, 0.2);
            color: #adb5bd;
        }
        
        .alert {
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
        }
        
        .alert-success {
            background: rgba(78, 205, 196, 0.2);
            border: 1px solid #4ecdc4;
            color: #4ecdc4;
        }
        
        .alert-error {
            background: rgba(255, 107, 107, 0.2);
            border: 1px solid #ff6b6b;
            color: #ff6b6b;
        }
        
        .alert-info {
            background: rgba(255, 193, 7, 0.2);
            border: 1px solid #ffc107;
            color: #ffc107;
        }
        
        @keyframes pulse {
            0%, 100% {
                opacity: 1;
            }
            50% {
                opacity: 0.5;
            }
        }
        
        .loading {
            animation: pulse 1.5s ease-in-out infinite;
        }
        
        @media (max-width: 768px) {
            .main-content {
                grid-template-columns: 1fr;
            }
            
            .container {
                padding: 20px;
            }
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="logo">🎮 FF Bot | Free Fire OB52</div>
        <a href="/logout" class="logout-btn">Logout →</a>
    </nav>
    
    <div class="container">
        <div id="alertContainer"></div>
        
        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-title">Connected Clients</div>
                <div class="stat-value" id="totalClients">0</div>
            </div>
            <div class="stat-card">
                <div class="stat-title">Spam Accounts</div>
                <div class="stat-value" id="spamAccounts">0</div>
            </div>
            <div class="stat-card">
                <div class="stat-title">Max Spam Count</div>
                <div class="stat-value">100</div>
            </div>
            <div class="stat-card">
                <div class="stat-title">Game Version</div>
                <div class="stat-value">OB52</div>
            </div>
        </div>
        
        <div class="main-content">
            <!-- Spam Form -->
            <div class="card">
                <div class="card-header">🎯 Spam Tool</div>
                <div class="card-body">
                    <div class="form-group">
                        <label>Team Code</label>
                        <input type="text" id="teamcode" placeholder="Enter team code..." required>
                    </div>
                    <div class="form-group">
                        <label>Message</label>
                        <textarea id="message" rows="3" placeholder="Enter spam message..."></textarea>
                    </div>
                    <div class="form-row">
                        <div class="form-group" style="margin-bottom: 0;">
                            <label>Spam Count (max 100)</label>
                            <input type="number" id="count" value="50" min="1" max="100">
                        </div>
                        <button id="getSquadBtn" class="btn-secondary">Get Squad Info</button>
                    </div>
                    
                    <div id="squadInfo" class="squad-info" style="display: none;"></div>
                    
                    <div class="progress-section" id="progressSection" style="display: none;">
                        <div class="progress-bar">
                            <div class="progress-fill" id="progressFill"></div>
                        </div>
                        <div class="progress-text" id="progressText">Đang spam...</div>
                    </div>
                    
                    <button id="spamBtn" style="width: 100%; margin-top: 20px;" disabled>Start Spam</button>
                </div>
            </div>
            
            <!-- Clients Status -->
            <div class="card">
                <div class="card-header">📡 Connected Clients</div>
                <div class="card-body">
                    <div class="client-list" id="clientList">
                        <div class="loading" style="text-align: center; padding: 20px; color: rgba(255,255,255,0.6);">
                            Loading...
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <script>
        let spamInterval = null;
        
        function showAlert(message, type) {
            const container = document.getElementById('alertContainer');
            const alert = document.createElement('div');
            alert.className = `alert alert-${type}`;
            alert.innerHTML = message;
            container.appendChild(alert);
            setTimeout(() => alert.remove(), 5000);
        }
        
        async function loadStatus() {
            try {
                const response = await fetch('/api/status');
                const data = await response.json();
                
                document.getElementById('totalClients').textContent = data.total_clients;
                document.getElementById('spamAccounts').textContent = data.spam_accounts.length;
                
                const clientList = document.getElementById('clientList');
                if (data.total_clients === 0) {
                    clientList.innerHTML = '<div style="text-align: center; padding: 20px; color: rgba(255,255,255,0.6);">No connected clients</div>';
                } else {
                    clientList.innerHTML = '';
                    for (const [uid, client] of Object.entries(data.clients)) {
                        const div = document.createElement('div');
                        div.className = 'client-item';
                        div.innerHTML = `
                            <span class="client-id">${client.id}</span>
                            <div class="client-status">
                                <span class="status-badge status-${client.status}">${client.status}</span>
                                <span style="font-size: 11px; color: rgba(255,255,255,0.5);">${client.message || ''}</span>
                            </div>
                        `;
                        clientList.appendChild(div);
                    }
                }
            } catch (error) {
                console.error('Failed to load status:', error);
            }
        }
        
        async function getSquadInfo() {
            const teamcode = document.getElementById('teamcode').value.trim();
            if (!teamcode) {
                showAlert('Please enter team code', 'error');
                return;
            }
            
            const btn = document.getElementById('getSquadBtn');
            btn.disabled = true;
            btn.textContent = 'Loading...';
            
            try {
                const response = await fetch('/api/get_squad', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ teamcode: teamcode })
                });
                const data = await response.json();
                
                if (data.success) {
                    const squadInfo = document.getElementById('squadInfo');
                    squadInfo.style.display = 'block';
                    squadInfo.innerHTML = `
                        <h4>✅ Squad Found!</h4>
                        <p><strong>Owner UID:</strong> <code>${data.OwNer_UiD}</code></p>
                        <p><strong>Chat Code:</strong> <code>${data.ChaT_CoDe}</code></p>
                        <p><strong>Squad Code:</strong> <code>${data.SQuAD_CoDe || 'N/A'}</code></p>
                    `;
                    document.getElementById('spamBtn').disabled = false;
                    showAlert('Squad info retrieved successfully!', 'success');
                } else {
                    showAlert(`Failed: ${data.reason || 'Unknown error'}`, 'error');
                    document.getElementById('spamBtn').disabled = true;
                }
            } catch (error) {
                showAlert('Failed to get squad info', 'error');
            } finally {
                btn.disabled = false;
                btn.textContent = 'Get Squad Info';
            }
        }
        
        async function startSpam() {
            const teamcode = document.getElementById('teamcode').value.trim();
            const message = document.getElementById('message').value.trim();
            const count = parseInt(document.getElementById('count').value);
            
            if (!teamcode || !message) {
                showAlert('Please fill all fields', 'error');
                return;
            }
            
            const spamBtn = document.getElementById('spamBtn');
            spamBtn.disabled = true;
            spamBtn.textContent = 'Spamming...';
            
            const progressSection = document.getElementById('progressSection');
            progressSection.style.display = 'block';
            document.getElementById('progressFill').style.width = '0%';
            document.getElementById('progressText').textContent = 'Starting spam...';
            
            try {
                const response = await fetch('/api/spam', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ teamcode: teamcode, message: message, count: count })
                });
                const data = await response.json();
                
                if (data.success) {
                    document.getElementById('progressFill').style.width = '100%';
                    document.getElementById('progressText').textContent = `✅ Spam completed! Sent ${data.spam_count} messages to ${data.squad_info?.OwNer_UiD || teamcode}`;
                    showAlert(`Spam completed! Sent ${data.spam_count} messages.`, 'success');
                } else {
                    document.getElementById('progressText').textContent = `❌ Failed: ${data.error || 'Unknown error'}`;
                    showAlert(`Spam failed: ${data.error || 'Unknown error'}`, 'error');
                }
            } catch (error) {
                document.getElementById('progressText').textContent = '❌ Spam failed';
                showAlert('Failed to start spam', 'error');
            } finally {
                spamBtn.disabled = false;
                spamBtn.textContent = 'Start Spam';
                setTimeout(() => {
                    progressSection.style.display = 'none';
                }, 3000);
            }
        }
        
        document.getElementById('getSquadBtn').addEventListener('click', getSquadInfo);
        document.getElementById('spamBtn').addEventListener('click', startSpam);
        
        // Auto refresh status
        loadStatus();
        setInterval(loadStatus, 5000);
    </script>
</body>
</html>
